<svg width="200" height="200" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="logo_gradient" x1="25" y1="50" x2="75" y2="50" gradientUnits="userSpaceOnUse">
            <stop stop-color="#38bdf8" />
            <stop offset="1" stop-color="#818cf8" />
        </linearGradient>
    </defs>
    
    <!-- Top Arc -->
    <path
        d="M25 50C25 36.1929 36.1929 25 50 25C63.8071 25 75 36.1929 75 50"
        stroke="#38bdf8"
        stroke-width="8"
        stroke-linecap="round"
    />
    
    <!-- Bottom Arc (Dotted Gradient) -->
    <path
        d="M75 50C75 63.8071 63.8071 75 50 75C36.1929 75 25 63.8071 25 50"
        stroke="url(#logo_gradient)"
        stroke-width="8"
        stroke-linecap="round"
        stroke-dasharray="1 12"
    />
    
    <!-- Center Circle (Dark for light backgrounds) -->
    <circle cx="50" cy="50" r="7" fill="#0f172a" />
</svg>
